name: Feature request
description: Suggest a new feature or improvement for Felicity Battery Cards
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you are running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe your ideal solution
      description: How would you like the feature to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there workarounds you have already tried?
    validations:
      required: false

  - type: dropdown
    id: card
    attributes:
      label: Which card is this for?
      options:
        - felicity-fleet-card
        - felicity-history-card
        - Both
        - New card
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and this has not been requested before
          required: true
